name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install
      - run: npm run check
      - run: npm run build
      - run: npm test

  # OIDC trusted publishing requires npm 11.5.1+ (Node 22 ships npm 10).
  publish:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # npm 11 supports OIDC trusted publishing; avoid unpinned major upgrades.
      - run: npm install -g npm@11
      - run: npm install
      - run: npm run build

      - name: Increment patch version and publish
        run: |
          npm --version
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view "${PACKAGE_NAME}@latest" version 2>/dev/null || true)

          NEXT_VERSION=$(node -e '
            const [local, published] = process.argv.slice(1);
            const parse = (version) => {
              if (!/^\d+\.\d+\.\d+$/.test(version)) {
                throw new Error(`Expected a stable semver version, got: ${version}`);
              }
              return version.split(".").map(Number);
            };
            const compare = (a, b) => {
              for (let i = 0; i < 3; i++) {
                if (a[i] !== b[i]) return a[i] - b[i];
              }
              return 0;
            };

            const localParts = parse(local);
            if (!published) {
              console.log(local);
            } else {
              const publishedParts = parse(published);
              if (compare(localParts, publishedParts) > 0) {
                console.log(local);
              } else {
                console.log(`${publishedParts[0]}.${publishedParts[1]}.${publishedParts[2] + 1}`);
              }
            }
          ' "$LOCAL_VERSION" "$PUBLISHED_VERSION")

          npm version "$NEXT_VERSION" --no-git-tag-version --allow-same-version
          echo "Publishing ${PACKAGE_NAME}@${NEXT_VERSION}"
          npm publish --provenance --access public
