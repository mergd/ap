version = 1

# Generated by: ap init --global
# Edit values below; re-run ap init --global [BUNDLE...] to merge new catalog bundles without overwriting yours.

[bundle.cloudflare]
ask = "Global API Key + account email."
docs = "https://developers.cloudflare.com/fundamentals/api/get-started/keys/#global-api-key"
prompt = "Auth: X-Auth-Email = CF_GLOBAL_EMAIL, X-Auth-Key = CF_GLOBAL_API_KEY (not Bearer).\nInject vars with ap run cloudflare -- sh -c '...' when the command needs $VAR expansion."
vars = ["CF_GLOBAL_API_KEY","CF_GLOBAL_EMAIL"]

[var.CF_GLOBAL_API_KEY]
visibility = "secret"
ask = "My Profile → API Tokens → Global API Key."

[var.CF_GLOBAL_EMAIL]
visibility = "public"
ask = "Account login email."

[bundle.namecheap]
ask = "Enable API access, whitelist IP, paste key."
docs = "https://www.namecheap.com/support/api/intro/"
prompt = "Every request needs query params ApiUser, ApiKey, ClientIp (NC_API_USER, NC_API_KEY, NC_CLIENT_IP).\nWhitelist NC_CLIENT_IP in Namecheap before calling the API."
vars = ["NC_API_USER","NC_API_KEY","NC_CLIENT_IP"]

[var.NC_API_USER]
visibility = "public"
ask = "API username (usually your account username)."

[var.NC_API_KEY]
visibility = "secret"
ask = "Profile → Tools → API Access."

[var.NC_CLIENT_IP]
visibility = "public"
ask = "Whitelisted client IP (resolved at runtime)."
derive = "public-ipv4"

[bundle.openrouter]
ask = "Management API key (provision keys) + usage API key."
docs = "https://openrouter.ai/docs/guides/overview/auth/management-api-keys"
prompt = "OPENROUTER_MANAGEMENT_API_KEY: admin only — create/list/delete keys at /api/v1/keys (not completions).\nOPENROUTER_API_KEY: usage key for model requests.\nCreate: POST https://openrouter.ai/api/v1/keys with Authorization: Bearer $OPENROUTER_MANAGEMENT_API_KEY.\nResponse: key string is at .key (top level), not .data.key. Store once: jq -r '.key' | ap set OPENROUTER_API_KEY --global.\nIf parsing fails, inspect the response — do not POST again (that creates duplicate keys)."
vars = ["OPENROUTER_MANAGEMENT_API_KEY","OPENROUTER_API_KEY"]

[var.OPENROUTER_MANAGEMENT_API_KEY]
visibility = "secret"
ask = "OpenRouter Settings → Management API Keys. Cannot call completions."

[var.OPENROUTER_API_KEY]
visibility = "secret"
ask = "OpenRouter usage API key (or provision via management key)."
