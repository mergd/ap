version = 1

[bundle.namecheap]
ask = "Namecheap API — enable API access, whitelist your IP, paste key."
docs = "https://www.namecheap.com/support/api/intro/"
vars = ["NC_API_USER", "NC_API_KEY", "NC_CLIENT_IP"]

[bundle.cloudflare]
ask = "Cloudflare → My Profile → API Tokens → Global API Key, or create a token with account permissions."
docs = "https://developers.cloudflare.com/fundamentals/api/get-started/create-token/"
vars = ["CF_GLOBAL_API_TOKEN"]

[var.NC_API_USER]
visibility = "public"
value = "value"

[var.NC_API_KEY]
visibility = "secret"
ask = "Namecheap Profile → Tools → API Access: paste key."

[var.NC_CLIENT_IP]
visibility = "public"
derive = "public-ipv4"

[var.CF_GLOBAL_API_TOKEN]
visibility = "secret"
ask = "Cloudflare → My Profile → API Tokens → Global API Key (or account-scoped API token)."
