version = 1

# Values only — bundle shape + auth live in the ap catalog (ap catalog list).
# Override with [bundle.NAME] or [var.KEY] in this file if needed.

[var.CF_GLOBAL_EMAIL]
visibility = "public"
value = "you@example.com"

[var.CF_GLOBAL_API_KEY]
visibility = "secret"
# echo "$KEY" | ap set CF_GLOBAL_API_KEY --global

[var.NC_API_USER]
visibility = "public"
value = "your-username"

[var.NC_API_KEY]
visibility = "secret"
# echo "$KEY" | ap set NC_API_KEY --global
